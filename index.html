<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEZU</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-text {
      position: absolute;
      top: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      font-size: 12px;
      opacity: 0.6;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .title-bg {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      font-weight: 900;
      color: rgba(255,255,255,0.07);
      letter-spacing: 10px;
      z-index: 0;
      pointer-events: none;
    }

    .character {
      width: 300px;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    .btn {
      margin-top: 30px;
      padding: 15px 50px;
      background: linear-gradient(45deg, #fff, #aaa);
      color: #000;
      font-weight: 600;
      font-size: 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 2px;
      display: inline-block;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    /* SCROLLING TEXT */
    .marquee {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-top: 50px;
      padding: 10px 0;
      position: relative;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 30s linear infinite;
      font-size: 16px;
      opacity: 0.8;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
      line-height: 1.5;
    }

    footer p:first-child {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="top-text">
    <span>Fallen</span>
    <span>Angel</span>
  </div>

  <div class="container">
    <div class="title-bg">KEZU</div>

    <!-- Character Image -->
    <img src="img.png" alt="KEZU Character" class="character">

    <!-- Button -->
    <a href="https://criminal-cb60636e40c6.herokuapp.com/" target="_blank" class="btn">PAIR</a>
  </div>

  <!-- Scrolling Text -->
  <div class="marquee">
    <span>𝐊ᴇᴢᴜ𝚄 ||🌿 || 𝐊ᴇᴢᴜ𝚄 ||🌿 || 𝐊ᴇᴢᴜ𝚄 ||🌿 || 𝐊ᴇᴢᴜ𝚄 ||🌿 || 𝐊ᴇᴢᴜ𝚄 ||🌿 || 𝐊ᴇᴢᴜ𝚄 ||🌿 ||</span>
  </div>

  <!-- Footer / Info -->
  <footer>
    <p>KEZU</p>
    <p>this is the kezu's whatsapp bot named it</p>
    <p>DCT Criminal md ts is the world powerful bot</p>
    <p>CONNECT AND ENJOY</p>
    <p>credit by king kezu</p>
  </footer>

</body>
</html>
