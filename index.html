<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEZU</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    /* BIG BACK TEXT */
    .title-bg {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      font-weight: 900;
      color: rgba(255,255,255,0.07);
      letter-spacing: 10px;
      z-index: 0;
    }

    /* CHARACTER IMAGE */
    .character {
      width: 300px;
      z-index: 2;
      position: relative;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    /* BUTTON */
    .btn {
      margin-top: 30px;
      padding: 15px 50px;
      border: none;
      background: linear-gradient(45deg, #fff, #aaa);
      color: #000;
      font-weight: 600;
      font-size: 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 2px;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    /* SMALL TEXT TOP */
    .top-text {
      position: absolute;
      top: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      font-size: 12px;
      opacity: 0.6;
    }

  </style>
</head>

<body>

  <div class="top-text">
    <span>Fallen</span>
    <span>Angel</span>
  </div>

  <div class="container">
    <div class="title-bg">KEZU</div>

    <!-- YOUR IMAGE HERE -->
    <img src="img.png" class="character">

    <br>

    <button class="btn">PAIR</button>
  </div>

</body>
</html>
